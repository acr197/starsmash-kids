name: Build APK

# Builds a debug APK on every push and pull request and uploads it as a
# downloadable artifact, so you can grab the APK from the GitHub Actions tab
# and install it directly on your phone via any APK installer.
#
# Pushing a tag like v1.0.0 will additionally publish the APK to a GitHub
# Release, giving you a stable, shareable download URL.

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Stage APK
        run: |
          mkdir -p artifact
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifact/StarSmashKids-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarSmashKids-debug-apk
          path: artifact/StarSmashKids-debug.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/StarSmashKids-debug.apk
          draft: false
          generate_release_notes: true
