name: Build APK

# Builds a debug APK on every push and pull request and uploads it as a
# downloadable artifact, so you can grab the APK from the GitHub Actions tab
# and install it directly on your phone via any APK installer.
#
# Pushing a tag like v1.0.0 will additionally publish the APK to a GitHub
# Release, giving you a stable, shareable download URL.

on:
  push:
    branches:
      - main
      - "claude/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # NOTE: We intentionally do NOT use gradle/actions/setup-gradle here.
      # Its remote build cache was returning HTTP 400 in CI and producing
      # noisy "Failed to restore gradle-home-v1" warnings. The build is
      # small enough that running gradle directly via ./gradlew is fast
      # and far easier to debug.

      - name: Show environment
        run: |
          echo "java -version:"
          java -version
          echo "gradle wrapper version:"
          ./gradlew --version || true
          echo "files:"
          ls -la
        shell: bash

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        id: build
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug \
            --stacktrace \
            --info \
            --no-daemon 2>&1 | tee gradle-build.log
        shell: bash

      - name: Upload gradle build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: warn

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/**
            app/build/outputs/logs/**
            **/build/reports/**
          if-no-files-found: ignore

      # Post the failing tail of the gradle log directly into the PR (or
      # the commit) on failure. This is the only reliable way for an
      # off-host reviewer to see the actual error without authenticating
      # to download the artifact.
      - name: Post gradle log tail to PR/commit on failure
        if: failure() && hashFiles('gradle-build.log') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const full = fs.readFileSync('gradle-build.log', 'utf8');
            const lines = full.split('\n');

            // Extract anything that looks like a kotlinc / javac / aapt2 error
            // line plus surrounding context. Kotlin emits lines starting with
            // "e: file://" or "e: ", javac with "error:", aapt2 with "ERROR:".
            const errPattern = /^(e: |w: |error:|ERROR:|FAILURE|What went wrong|Caused by:|> Task :.*FAILED)/;
            const errIdx = [];
            lines.forEach((l, i) => { if (errPattern.test(l)) errIdx.push(i); });
            const ctx = new Set();
            errIdx.forEach(i => {
              for (let j = Math.max(0, i - 2); j <= Math.min(lines.length - 1, i + 8); j++) ctx.add(j);
            });
            const errSlice = [...ctx].sort((a, b) => a - b)
              .map(i => `${String(i + 1).padStart(5, ' ')}: ${lines[i]}`)
              .join('\n');

            const tail = lines.slice(-200).join('\n');
            const body = [
              '### Build debug APK — failure log',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Total log lines: ${lines.length}`,
              '',
              '<details open><summary>Errors and warnings (with context)</summary>',
              '',
              '```',
              errSlice || '(no error/warning lines matched)',
              '```',
              '',
              '</details>',
              '',
              '<details><summary>gradle-build.log (last 200 lines)</summary>',
              '',
              '```',
              tail,
              '```',
              '',
              '</details>',
            ].join('\n');
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            } else {
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body,
              });
            }

      - name: Stage APK
        if: success()
        run: |
          mkdir -p artifact
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifact/StarSmashKids-debug.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StarSmashKids-debug-apk
          path: artifact/StarSmashKids-debug.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release (on tag)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/StarSmashKids-debug.apk
          draft: false
          generate_release_notes: true

      # Rolling "latest" release on every push to main, so the APK is always
      # downloadable from the repo's Releases page without hunting through the
      # Actions tab. The release is overwritten on each main build.
      - name: Publish APK to rolling 'latest' Release (main only)
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          files: artifact/StarSmashKids-debug.apk
          draft: false
          prerelease: true
          body: |
            Auto-built debug APK from the latest commit on `main`.
            Built from commit ${{ github.sha }}.
          fail_on_unmatched_files: true
